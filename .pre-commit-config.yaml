# Optional: pip install pre-commit && pre-commit install
repos:
  - repo: local
    hooks:
      - id: no-pycache-in-commit
        name: Forbid __pycache__ and .pyc in commits
        entry: python scripts/check_staged_not_pycache.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
